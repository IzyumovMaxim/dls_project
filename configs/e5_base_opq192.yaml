name: e5_base_opq192

model:
  name: intfloat/e5-base-v2
  normalize: true
  query_prompt: "query: "      # e5 is trained with query:/passage: prefixes on BOTH sides
  doc_prompt: "passage: "
  batch_size: 256
  fp16: true
  device: cuda

index:
  type: pq
  opq: true          # rotate before quantizing: same code size, ~8 min to train
  pq_m: 192          # 768/192 = 4 dims per sub-quantizer -> 192 bytes/vec, 15x smaller than fp32
  pq_nbits: 8
  vectors_from: e5_base_flat   # stores codes, not vectors: sentence evidence is read there

eval:
  top_k: 100
  k_values: [1, 5, 10, 100]
