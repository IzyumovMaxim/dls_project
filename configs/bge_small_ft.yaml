# Fine-tuned bge-small. Flow:
#   1. build_index --config bge_small_flat     (base index for mining)
#   2. mine_negatives --config bge_small_ft
#   3. train --config bge_small_ft             -> models/bge_small_ft
#   4. build_index / evaluate --config bge_small_ft --model-path models/bge_small_ft
name: bge_small_ft

model:
  name: BAAI/bge-small-en-v1.5
  batch_size: 64

index:
  type: flat

train:
  base_config: bge_small_flat
  epochs: 1
  lr: 2.0e-5
  batch_size: 64
  hard_negatives: 4

eval:
  top_k: 100
  k_values: [1, 5, 10, 100]
